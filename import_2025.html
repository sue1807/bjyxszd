<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导入记录 · 五谷丰登</title>
  <style>
    :root { --accent: #c9847a; --accent-deep: #b06b62; --bg: #f7f3ee; --muted: #a08880; --line: #ead8d0; --text: #3d2f2d; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 820px; margin: 0 auto; }
    h1 { color: var(--accent-deep); font-size: 20px; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .card { background: #fff; border-radius: 14px; border: 1px solid var(--line); padding: 16px; margin-bottom: 14px; }
    .upload-area { border: 2px dashed var(--line); border-radius: 12px; padding: 28px; text-align: center; cursor: pointer; transition: .2s; }
    .upload-area:hover, .upload-area.drag { border-color: var(--accent); background: #fdf7f5; }
    .upload-icon { font-size: 32px; margin-bottom: 8px; }
    .upload-label { font-size: 14px; color: var(--accent-deep); font-weight: 500; }
    .upload-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .status { font-size: 13px; line-height: 1.8; }
    .progress-bar { height: 6px; background: #f0e8e5; border-radius: 3px; margin: 8px 0; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; width: 0%; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: #fdf0ec; padding: 8px 10px; text-align: left; color: var(--accent-deep); font-weight: 500; }
    td { padding: 6px 10px; border-top: 1px solid #f5eeeb; vertical-align: top; }
    tr.skip td { color: #bbb; }
    tr.done td { color: #999; background: #f9fdf9; }
    tr.error td { background: #fff5f5; color: #c00; }
    .tag { display: inline-block; background: #f5eeeb; color: var(--accent-deep); border-radius: 20px; padding: 1px 6px; font-size: 10px; margin: 1px; }
    .btn { padding: 9px 20px; border-radius: 11px; border: none; cursor: pointer; font-size: 13px; font-family: inherit; transition: .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .btn-ghost { background: #f5eeeb; color: var(--accent-deep); }
    .actions { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
    .badge { font-size: 11px; background: #fff0ee; color: var(--accent); padding: 3px 9px; border-radius: 20px; }
    .hidden { display: none !important; }
    .tip { font-size: 11px; color: var(--muted); line-height: 1.8; padding-left: 14px; }
    .tip li { margin-bottom: 2px; }
    a.back { font-size: 13px; color: var(--muted); text-decoration: none; }
  </style>
</head>
<body>
  <h1>📥 导入读书记录</h1>
  <p class="sub">支持幕布导出的 Word（.docx）文件，自动解析并批量导入</p>

  <div class="card" id="uploadCard">
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept=".docx" style="display:none" />
      <div class="upload-icon">📄</div>
      <div class="upload-label">点击选择 .docx 文件</div>
      <div class="upload-hint">支持 2023 / 2024 / 2025 等年度格式，自动识别结构</div>
    </div>
    <ul class="tip" style="margin-top:12px;">
      <li>文件结构：月份标题（Jan./Feb.…）或直接编号书名</li>
      <li>自动识别 20+ 类标签：种田/穿越/重生/ABO/骨科/玄幻/娱乐圈…</li>
      <li>2024格式支持从书名 ⭐️ 数量自动换算评分</li>
      <li>已存在的书名自动跳过</li>
    </ul>
  </div>

  <div class="card hidden" id="previewCard">
    <div class="status" id="statusBox" style="color:var(--muted);">解析中…</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="actions hidden" id="actionBar">
      <button class="btn btn-primary" id="btnImport">开始导入</button>
      <button class="btn btn-ghost" id="btnReset">重新上传</button>
      <span class="badge" id="countBadge"></span>
    </div>
    <div style="overflow-x:auto;margin-top:8px;">
      <table>
        <thead><tr><th>#</th><th>书名</th><th>作者 · 主角</th><th>日期</th><th>评分</th><th>标签</th><th>状态</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div style="margin-top:14px;"><a href="index.html" class="back">← 返回书架</a></div>

<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="config.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient(window.APP_CONFIG?.SUPABASE_URL||'', window.APP_CONFIG?.SUPABASE_ANON_KEY||'');

// ── TAG KEYWORDS ──
const TAG_KW = {
  '种田':['种田','田园','务农','发家致富','种地'],
  '穿越':['穿越','穿到','穿身','魂穿','穿书'],
  '重生':['重生','上一世','前世','上辈子','读档','循环'],
  '现代':['现代','都市','当代'],
  '校园':['校园','学校','高中','大学','同桌','同学'],
  '古代':['古代','朝堂','科举','架空','王朝','皇帝','太子','国公','权谋','纨绔'],
  '玄幻':['玄幻','修真','修仙','飞升','灵力','丹药','门派','炼器'],
  'ABO':['abo','哨向','向导','信息素','标记','发情','哥儿'],
  '骨科':['骨科','亲兄弟','同父','同母'],
  '星际':['星际','联盟','星舰'],
  '年代文':['年代','70年代','80年代','90年代','知青'],
  '娱乐圈':['娱乐圈','明星','idol','艺人','经纪'],
  '爽文':['爽文','开挂','无敌','发飙','反打'],
  '甜文':['甜文','日常向','甜蜜'],
  '虐文':['虐心','心疼','泪目','心痛'],
  '豪门':['豪门','世家','大佬'],
  '灵异':['灵异','玄学','棺材','妖孽'],
  '刑侦':['刑侦','法医','案件','犯罪','推理'],
  '丧尸':['丧尸','末世','病毒'],
  '破镜重圆':['破镜重圆','重圆','离婚','分手后'],
  '年上':['年上','年长'],
  '年下':['年下','年少'],
  '无限流':['无限流','副本','游戏'],
};

function extractTags(text) {
  const low = text.toLowerCase();
  return Object.entries(TAG_KW)
    .filter(([,kws]) => kws.some(k => low.includes(k.toLowerCase())))
    .map(([tag]) => tag);
}

// Count ⭐️ stars → rating (0-10)
function parseStars(text) {
  const m = text.match(/⭐️*/g);
  if (!m) return 0;
  const stars = m.join('').replace(/[^⭐]/g,'').length;
  return stars ? Math.min(stars * 2, 10) : 0;
}

const MONTH_MAP = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
                   Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};

function parseLines(lines, year) {
  // Detect format: has month headers?
  const hasMonths = lines.some(l => /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\.?/.test(l.trim()));
  // 2024 format: author in separate Normal line (starts with "by ")
  const hasAuthorLine = lines.some(l => /^by\s+\S+[，,]/.test(l.trim()));

  const records = [];
  let currentMonth = '01';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i].trim();
    if (!line) { i++; continue; }

    // Month header
    const mM = line.match(/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\.?/);
    if (mM) { currentMonth = MONTH_MAP[mM[1]]; i++; continue; }

    // Book entry
    const bookM = line.match(/^\d+[.．]?\s*(?:重温)?[《「](.+?)[》」](.*)?$/);
    if (bookM) {
      const name = bookM[1].trim();
      const rest = (bookM[2] || '').trim();
      let author = '', chars = '', rating = 0;

      // Extract stars from title
      rating = parseStars(line);

      // Parse "by author，chars" from title rest (2025/2023 format)
      const byM = rest.replace(/[⭐️\s]+/g,'').match(/^by\s*(.+?)(?:[，,]\s*(.+))?$/);
      if (byM) {
        author = byM[1].trim().replace(/^[.\s]+/,'');
        chars = (byM[2] || '').trim();
      }

      let summary = '', notes = '';

      // Next line(s)
      i++;
      while (i < lines.length) {
        const next = lines[i].trim();
        if (!next) { i++; continue; }

        // Stop if it's another book or month
        if (/^\d+[.．]?\s*[《「重]/.test(next)) break;
        if (/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\.?/.test(next)) break;

        // 2024 format: author line
        if (!author && /^by\s+\S+/.test(next)) {
          // "by北南，娱乐圈文。💟瞿燕庭&陆文，desc"
          const al = next.replace(/^by\s*/,'');
          const comma = al.search(/[，,]/);
          if (comma > 0) {
            author = al.slice(0, comma).trim();
            // rest might have chars & brief
            const rest2 = al.slice(comma+1).trim();
            // Try to find chars pattern (name&name or name x name)
            const charM = rest2.match(/[💟♥]?\s*([^\s，,。！？]{2,10}[&x×][^\s，,。！？]{2,10})/);
            if (charM) chars = charM[1].trim();
            summary = rest2;
          } else {
            author = al.trim();
          }
          i++;
          continue;
        }

        // Brief summary (short, no author)
        if (!summary && next.length < 80 && !author) {
          summary = next; i++; continue;
        }
        if (!summary && next.length < 80) {
          summary = next; i++; continue;
        }

        // Long review → notes
        notes += (notes ? '\n' : '') + next;
        i++;
      }

      const fullText = `${summary} ${notes}`;
      records.push({
        name, author, main_characters: chars,
        review_date: `${year}-${currentMonth}-01`,
        type: 'BL小说',
        rating,
        tags: extractTags(fullText),
        story_summary: summary,
        notes,
      });
      continue;
    }
    i++;
  }
  return records;
}

// ── MAIN ──
let parsedData = [], existingNames = new Set(), currentUser = null;

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session?.user) { alert('请先登录'); window.location.href='index.html'; return; }
  currentUser = session.user;
}

// File input
const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

async function handleFile(file) {
  if (!file) return;
  document.getElementById('previewCard').classList.remove('hidden');
  document.getElementById('actionBar').classList.add('hidden');
  document.getElementById('statusBox').textContent = '解析中…';
  document.getElementById('tableBody').innerHTML = '';

  // Extract year from filename
  const yearM = file.name.match(/20\d\d/);
  const year = yearM ? yearM[0] : new Date().getFullYear().toString();

  // Read docx with mammoth
  try {
    const arrayBuffer = await file.arrayBuffer();
    if (typeof mammoth === 'undefined') {
      document.getElementById('statusBox').textContent = '❌ 解析库加载失败，请检查网络后刷新重试';
      return;
    }
    const result = await mammoth.extractRawText({ arrayBuffer });
    const lines = result.value.split('\n').filter(l => l.trim());

    parsedData = parseLines(lines, year);
  } catch(err) {
    document.getElementById('statusBox').textContent = '❌ 解析失败：' + err.message;
    return;
  }

  // Load existing names
  const { data } = await supabase.from('spirit_records').select('name').eq('user_id', currentUser.id);
  existingNames = new Set((data||[]).map(r => r.name));

  renderTable();
  const newCount = parsedData.filter(r => !existingNames.has(r.name)).length;
  document.getElementById('countBadge').textContent = `新增 ${newCount} 条 / 跳过 ${parsedData.length - newCount} 条`;
  document.getElementById('statusBox').textContent = `解析完成，共识别 ${parsedData.length} 条记录`;
  document.getElementById('actionBar').classList.remove('hidden');
}

function renderTable() {
  document.getElementById('tableBody').innerHTML = parsedData.map((r, i) => {
    const skip = existingNames.has(r.name);
    const tagsHtml = r.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const ratingStr = r.rating ? `★${r.rating}` : '-';
    return `<tr id="row_${i}" class="${skip?'skip':''}">
      <td>${i+1}</td>
      <td style="white-space:nowrap;">《${r.name}》</td>
      <td style="color:var(--muted);font-size:11px;white-space:nowrap;">${[r.author,r.main_characters].filter(Boolean).join(' · ')||'-'}</td>
      <td style="white-space:nowrap;">${r.review_date.slice(0,7)}</td>
      <td style="white-space:nowrap;">${ratingStr}</td>
      <td>${tagsHtml||'-'}</td>
      <td id="st_${i}">${skip?'⏭ 已存在':'待导入'}</td>
    </tr>`;
  }).join('');
}

document.getElementById('btnImport').addEventListener('click', async () => {
  document.getElementById('btnImport').disabled = true;
  const toImport = parsedData.filter(r => !existingNames.has(r.name));
  let done = 0, errors = 0;
  for (const r of toImport) {
    const idx = parsedData.indexOf(r);
    document.getElementById(`st_${idx}`).textContent = '导入中…';
    const { error } = await supabase.from('spirit_records').insert({
      name: r.name, author: r.author||null,
      main_characters: r.main_characters||null,
      review_date: r.review_date, type: r.type,
      rating: r.rating||0,
      tags: r.tags.length ? r.tags : null,
      story_summary: r.story_summary||null,
      notes: r.notes||null,
      is_public: false, user_id: currentUser.id
    });
    if (error) {
      document.getElementById(`st_${idx}`).textContent = '❌ 失败';
      document.getElementById(`row_${idx}`).className = 'error';
      errors++;
    } else {
      document.getElementById(`st_${idx}`).textContent = '✅ 完成';
      document.getElementById(`row_${idx}`).className = 'done';
      done++;
    }
    const pct = Math.round((done+errors)/toImport.length*100);
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('statusBox').textContent = `已导入 ${done} 条，失败 ${errors} 条，共 ${toImport.length} 条`;
    await new Promise(r => setTimeout(r, 150));
  }
  document.getElementById('statusBox').textContent = `✅ 导入完成！成功 ${done} 条，失败 ${errors} 条`;
  document.getElementById('btnImport').disabled = false;
});

document.getElementById('btnReset').addEventListener('click', () => {
  fileInput.value = '';
  parsedData = [];
  document.getElementById('previewCard').classList.add('hidden');
});

init();
</script>
</body>
</html>
