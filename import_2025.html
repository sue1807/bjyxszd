let currentUser = null;
let existingNames = new Set();

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session?.user) {
    document.getElementById('statusText').textContent = '未登录，请先登录后访问此页面';
    document.getElementById('btnImport').disabled = true;
    return;
  }
  currentUser = session.user;

  // Load existing book names
  const { data } = await supabase.from('spirit_records')
    .select('name').eq('user_id', currentUser.id);
  existingNames = new Set((data||[]).map(r => r.name));

  renderTable();
  const newCount = DATA.filter(r => !existingNames.has(r.name)).length;
  document.getElementById('countBadge').textContent = `新增 ${newCount} 条 / 跳过 ${DATA.length - newCount} 条`;
  document.getElementById('statusText').textContent = `已登录：${currentUser.email}，可以开始导入`;
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = DATA.map((r, i) => {
    const skip = existingNames.has(r.name);
    const tagsHtml = r.tags.map(t => `<span class="tag">${t}</span>`).join('');
    return `<tr id="row_${i}" class="${skip ? 'skip' : ''}">
      <td>${i+1}</td>
      <td>《${r.name}》</td>
      <td style="color:var(--muted)">${[r.author, r.main_characters].filter(Boolean).join(' · ')}</td>
      <td>${r.review_date.slice(0,7)}</td>
      <td>${tagsHtml || '-'}</td>
      <td id="status_${i}">${skip ? '⏭ 已存在' : '待导入'}</td>
    </tr>`;
  }).join('');
}

window.startImport = async function() {
  if (!currentUser) return alert('请先登录');
  document.getElementById('btnImport').disabled = true;

  const toImport = DATA.filter(r => !existingNames.has(r.name));
  let done = 0, errors = 0;

  for (let i = 0; i < DATA.length; i++) {
    const r = DATA[i];
    if (existingNames.has(r.name)) continue;

    const idx = DATA.indexOf(r);
    document.getElementById(`status_${idx}`).textContent = '导入中…';

    const { error } = await supabase.from('spirit_records').insert({
      name: r.name,
      author: r.author || null,
      main_characters: r.main_characters || null,
      review_date: r.review_date,
      type: r.type,
      tags: r.tags.length ? r.tags : null,
      story_summary: r.story_summary || null,
      notes: r.notes || null,
      rating: 0,
      is_public: false,
      user_id: currentUser.id
    });

    if (error) {
      document.getElementById(`status_${idx}`).textContent = '❌ 失败';
      document.getElementById(`row_${idx}`).className = 'error';
      errors++;
    } else {
      document.getElementById(`status_${idx}`).textContent = '✅ 完成';
      document.getElementById(`row_${idx}`).className = 'done';
      done++;
    }

    const pct = Math.round((done + errors) / toImport.length * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('statusText').textContent = `已导入 ${done} 条，失败 ${errors} 条，共 ${toImport.length} 条`;
    
    await new Promise(r => setTimeout(r, 150)); // slight delay to avoid rate limit
  }

  document.getElementById('statusText').textContent = `✅ 导入完成！成功 ${done} 条，失败 ${errors} 条`;
  document.getElementById('btnImport').disabled = false;
};

init();
</script>
