<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>共同书架 · 五谷丰登</title>
  <link rel="preconnect" href="https://fonts.googleapis.cn" crossorigin />
  <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f3ee; --card: #ffffff; --text: #3d2f2d; --muted: #a08880;
      --line: #ead8d0; --accent: #c9847a; --accent-light: #f2d0cc;
      --accent-deep: #b06b62; --soft: #fdf7f5;
      --shadow: 0 4px 16px rgba(140,90,80,0.09); --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans SC", "PingFang SC", sans-serif; font-weight: 300; background: var(--bg); color: var(--text); line-height: 1.6; }
    .hidden { display: none !important; }

    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,243,238,0.88); backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(234,216,208,0.6);
    }
    .header-inner {
      max-width: 860px; margin: 0 auto; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-name { font-size: 19px; font-weight: 400; color: var(--accent-deep); letter-spacing: 1px; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .user-badge { font-size: 12px; color: var(--muted); background: #f5eeeb; border-radius: 20px; padding: 5px 10px; }

    .container { max-width: 860px; margin: 0 auto; padding: 14px 16px 60px; }

    button { border: none; border-radius: 11px; padding: 8px 14px; cursor: pointer; font: inherit; font-size: 13px; transition: .2s; }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { color: var(--accent-deep); background: var(--accent-light); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
    #searchInput { width: 100%; padding: 11px 14px 11px 40px; font-size: 12px; background: #fff; border: 1.5px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); font: inherit; color: var(--text); outline: none; }
    #searchInput:focus { border-color: var(--accent); }
    input::placeholder { font-size: 13px; color: var(--muted); }

    .global-status { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 10px; }

    /* filters */
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 11px; background: #fff; border: 1.5px solid var(--line); color: var(--muted); cursor: pointer; transition: .15s; }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .list-panel { background: #fff; border-radius: var(--radius); border: 1px solid var(--line); box-shadow: var(--shadow); }
    .list-head {
      padding: 10px 16px; display: flex; align-items: center;
      background: linear-gradient(135deg, #fdf0ec, #f8e8e4);
      border-bottom: 1px solid var(--line);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .list-head-title { font-size: 16px; font-weight: 400; color: var(--accent-deep); letter-spacing: 1px; }

    .record-row { padding: 6px 12px; border-bottom: 1px solid #f5eeeb; }
    .record-row:last-child { border-bottom: none; }
    .record-row-title { font-size: 15px; font-weight: 400; color: var(--accent-deep); margin-bottom: 2px; display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px; }
    .record-sub { font-size: 11px; color: var(--muted); margin-left: 4px; }
    .record-row-line2 { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin: 3px 0; }
    .meta-tag { font-size: 11px; padding: 2px 7px; border-radius: 20px; background: #f5eeeb; color: #b89890; }
    .meta-rating { font-size: 11px; font-weight: 600; color: var(--accent); }
    .record-row-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .record-nickname { font-size: 10px; color: var(--muted); }
    .record-row-line2 { display: flex; flex-wrap: nowrap; gap: 4px; align-items: center; margin: 2px 0; }
    .record-date-right { margin-left: auto; font-size: 10px; color: var(--muted); }
    .user-row { display: flex; align-items: center; flex-wrap: nowrap; gap: 4px; padding: 2px 0; }
    .user-row-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .meta-tag-sm { font-size: 10px; padding: 1px 5px; border-radius: 20px; background: #f5eeeb; color: #b89890; }
    .user-row { cursor: pointer; border-radius: 8px; transition: background .15s; }
    .user-row:hover { background: #fdf5f3; }
    .quick-review { display: none; font-size: 11px; color: var(--accent-deep); padding: 3px 0 3px 22px; font-style: italic; }
    .user-row.open + .quick-review { display: block; }

    .empty-state { padding: 48px 20px; text-align: center; color: var(--muted); }
    .empty-state-icon { font-size: 40px; margin-bottom: 10px; }

    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-top: 1px solid #f5eeeb; }
    .page-btn { min-width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0 8px; }
    .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    /* auth gate */
    .auth-gate { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); font-size: 14px; }
    .auth-gate a { color: var(--accent-deep); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="brand">
      <span style="font-size:22px;">📚</span>
      <span class="brand-name">公共书架</span>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge">-</span>
      <button class="btn-ghost btn-sm" id="btnRefresh">刷新</button>
      <a href="index.html"><button class="btn-ghost btn-sm">我的书架</button></a>
    </div>
  </div>
</header>

<div class="container">
  <div id="authGate" class="auth-gate hidden">
    <div style="font-size:36px;">🔒</div>
    <div>请先登录后查看共同书架</div>
    <a href="index.html">前往登录 →</a>
  </div>

  <div id="mainContent" class="hidden">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="搜索书名、作者、标签…" />
    </div>
    <div class="global-status" id="globalStatus"></div>

    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button id="sortRating" class="btn-ghost btn-sm" style="border:1.5px solid var(--accent);color:var(--accent-deep);border-radius:20px;padding:4px 12px;font-size:12px;">★ 按评分</button>
      <button id="sortDate" class="btn-ghost btn-sm" style="border:1.5px solid var(--line);color:var(--muted);border-radius:20px;padding:4px 12px;font-size:12px;">📅 按时间</button>
    </div>
    <div class="filter-row" id="filterRow"></div>

    <div class="list-panel">
      <div class="list-head">
        <span class="list-head-title">公共书架</span>
      </div>
      <div id="recordsList"></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
  const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
  const TYPE_ICONS = { 'BL小说': '🌙', '文学小说': '📖', '非虚构书籍': '📝', '广播剧': '🎧' };
  const PAGE_SIZE = 20;

  let supabase, currentUser, allRecords = [], profiles = {}, currentPage = 1, typeFilter = '';

  function esc(v) { return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function getRatingLabel(r) {
    const v = Number(r);
    if (v===10) return '神作'; if (v>=7.6) return '推荐'; if (v>=6) return '还不错'; if (v>=4.1) return '文荒可看'; return '难看';
  }

  async function init() {
    if (!SUPABASE_URL) return;
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data: { session } } = await supabase.auth.getSession();
    currentUser = session?.user ?? null;

    if (!currentUser) {
      document.getElementById('authGate').classList.remove('hidden');
      return;
    }

    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('userBadge').textContent = currentUser.email;

    await loadData();
  }

  async function loadData() {
    document.getElementById('globalStatus').textContent = '加载中…';
    const [recRes, profRes] = await Promise.all([
      supabase.from('spirit_records').select('id,name,type,rating,tags,author,main_characters,review_date,user_id,is_public,quick_review').eq('is_public', true).order('rating', { ascending: false, nullsFirst: false }).order('name'),
      supabase.from('profiles').select('id,nickname')
    ]);
    if (recRes.error) {
      document.getElementById('globalStatus').textContent = '加载失败：' + recRes.error.message;
      return;
    }
    allRecords = recRes.data || [];
    (profRes.data || []).forEach(p => { profiles[p.id] = p.nickname; });
    renderFilters();
    renderRecords();
    document.getElementById('globalStatus').textContent = `共 ${allRecords.length} 条公开记录`;
  }

  function renderFilters() {
    const types = [...new Set(allRecords.map(r => r.type).filter(Boolean))];
    const allChip = `<span class="filter-chip ${typeFilter===''?'active':''}" data-type="">全部</span>`;
    document.getElementById('filterRow').innerHTML = allChip + types.map(t =>
      `<span class="filter-chip ${typeFilter===t?'active':''}" data-type="${esc(t)}">${TYPE_ICONS[t]||''} ${esc(t)}</span>`
    ).join('');
  }

  function renderRecords() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const filtered = allRecords.filter(r => {
      if (typeFilter && r.type !== typeFilter) return false;
      if (!keyword) return true;
      return [r.name, r.author||'', ...(r.tags||[])].join(' ').toLowerCase().includes(keyword);
    });

    if (!filtered.length) {
      document.getElementById('recordsList').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><div>还没有公开的记录</div></div>`;
      return;
    }

    // Group ALL filtered by book name, use max rating per group
    const groupMap = new Map();
    filtered.forEach(r => {
      const key = (r.name||'').trim();
      if (!groupMap.has(key)) groupMap.set(key, { base: r, users: [], maxRating: r.rating||0, latestDate: r.review_date||'' });
      const g = groupMap.get(key);
      g.users.push(r);
      if ((r.rating||0) > g.maxRating) { g.maxRating = r.rating||0; g.base = r; }
      if ((r.review_date||'') > g.latestDate) g.latestDate = r.review_date||'';
    });

    let groups = [...groupMap.values()];
    if (sortMode === 'rating') {
      groups.sort((a,b) => b.maxRating - a.maxRating);
    } else {
      groups.sort((a,b) => b.latestDate.localeCompare(a.latestDate));
    }

    const totalPages = Math.ceil(groups.length/PAGE_SIZE);
    currentPage = Math.min(currentPage, totalPages||1);
    const paged = groups.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

    document.getElementById('recordsList').innerHTML = `
      <div>${paged.map(g => {
        const b = g.base;
        const icon = TYPE_ICONS[b.type] || '📌';
        const authorStr = [b.author, b.main_characters].filter(Boolean).map(s => esc(s)).join(' · ');
        const usersHtml = g.users.map(r => {
          const nickname = profiles[r.user_id] || '匿名';
          const tagsHtml = (r.tags||[]).map(t => `<span class="meta-tag-sm">${esc(t)}</span>`).join('');
          const hasReview = r.quick_review?.trim();
          return `<div class="user-row${hasReview ? ' has-review' : ''}" data-review="${hasReview ? esc(r.quick_review) : ''}">
            <span class="meta-rating">★ ${r.rating} · ${getRatingLabel(r.rating)}</span>
            <span class="record-nickname" style="flex-shrink:0;">&nbsp;${esc(nickname)}${hasReview ? ' 💬' : ''}</span>
            <span class="user-row-tags">${tagsHtml}</span>
            ${r.review_date ? `<span class="record-date-right" style="flex-shrink:0;">${r.review_date.slice(0,7)}</span>` : ''}
          </div>${hasReview ? `<div class="quick-review">${esc(r.quick_review)}</div>` : ''}`;
        }).join('');
        return `<div class="record-row">
          <div class="record-row-title">${icon} ${esc(b.name)}${authorStr ? `<span class="record-sub">${authorStr}</span>` : ''}</div>
          ${usersHtml}
        </div>`;
      }).join('')}</div>
      ${totalPages > 1 ? `<div class="pagination">
        <button class="page-btn" ${currentPage===1?'disabled':''} data-page="${currentPage-1}">‹</button>
        ${Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i+1===currentPage?'active':''}" data-page="${i+1}">${i+1}</button>`).join('')}
        <button class="page-btn" ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">›</button>
      </div>` : ''}`;
  }

  document.getElementById('searchInput').addEventListener('input', () => { currentPage=1; renderRecords(); });

  document.addEventListener('click', e => {
    const row = e.target.closest('.user-row.has-review');
    if (row) { row.classList.toggle('open'); }
  }, true);

  document.addEventListener('click', e => {
    if (e.target.dataset.type !== undefined && e.target.classList.contains('filter-chip')) {
      typeFilter = typeFilter === e.target.dataset.type ? '' : e.target.dataset.type;
      currentPage = 1; renderFilters(); renderRecords();
    }
    if (e.target.dataset.page) {
      currentPage = parseInt(e.target.dataset.page);
      renderRecords();
      document.querySelector('.list-panel').scrollIntoView({behavior:'smooth'});
    }
  });

  document.getElementById('sortRating')?.addEventListener('click', () => {
    sortMode = 'rating';
    document.getElementById('sortRating').style.borderColor = 'var(--accent)';
    document.getElementById('sortRating').style.color = 'var(--accent-deep)';
    document.getElementById('sortDate').style.borderColor = 'var(--line)';
    document.getElementById('sortDate').style.color = 'var(--muted)';
    currentPage = 1; renderRecords();
  });
  document.getElementById('sortDate')?.addEventListener('click', () => {
    sortMode = 'date';
    document.getElementById('sortDate').style.borderColor = 'var(--accent)';
    document.getElementById('sortDate').style.color = 'var(--accent-deep)';
    document.getElementById('sortRating').style.borderColor = 'var(--line)';
    document.getElementById('sortRating').style.color = 'var(--muted)';
    currentPage = 1; renderRecords();
  });
  document.getElementById('btnRefresh')?.addEventListener('click', loadData);
  init();
</script>
</body>
</html>
