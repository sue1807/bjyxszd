<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>五谷丰登</title>
  <link rel="preconnect" href="https://fonts.googleapis.cn" crossorigin />
  <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f3ee;
      --card: #ffffff;
      --text: #3d2f2d;
      --muted: #a08880;
      --line: #ead8d0;
      --accent: #c9847a;
      --accent-light: #f2d0cc;
      --accent-deep: #b06b62;
      --soft: #fdf7f5;
      --danger: #c96060;
      --shadow: 0 4px 16px rgba(140,90,80,0.09);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-text-size-adjust: 100%;
    }

    .hidden { display: none !important; }

    /* ─── AUTH ─────────────────────────────── */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #fdf0ec 0%, #f3e8e0 100%);
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(160,100,80,0.12);
      padding: 36px 32px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo-icon {
      font-size: 44px;
      display: block;
      margin-bottom: 10px;
    }

    .auth-logo h1 {
      font-size: 26px;
      color: var(--accent-deep);
      letter-spacing: 2px;
    }

    .auth-logo p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .auth-tabs {
      display: flex;
      background: #f5eeeb;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 9px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: .2s;
      background: transparent;
      color: var(--muted);
    }

    .auth-tab.active {
      background: #fff;
      color: var(--accent-deep);
      box-shadow: 0 2px 8px rgba(180,100,80,0.12);
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-deep);
    }

    input, textarea, select {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: 11px;
      padding: 11px 14px;
      background: var(--soft);
      color: var(--text);
      outline: none;
      font: inherit;
      font-size: 15px;
      transition: border .2s, box-shadow .2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,132,122,0.15);
      background: #fff;
    }

    textarea { min-height: 120px; resize: vertical; }

    button {
      border: none;
      border-radius: 11px;
      padding: 11px 18px;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      transition: .2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-deep); transform: translateY(-1px); }
    .btn-primary:active { transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 13px;
    }
    .btn-ghost:hover { color: var(--accent-deep); background: var(--accent-light); }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 8px;
    }

    .btn-secondary {
      background: #f2e8e5;
      color: var(--accent-deep);
    }
    .btn-secondary:hover { background: var(--accent-light); }

    .btn-danger {
      background: #fce8e8;
      color: var(--danger);
    }
    .btn-danger:hover { background: #f5d0d0; }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    /* ─── APP HEADER ───────────────────────── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247,243,238,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(234,216,208,0.6);
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon { font-size: 22px; }

    .brand-name {
      font-size: 19px;
      font-weight: 700;
      color: var(--accent-deep);
      letter-spacing: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .user-badge {
      font-size: 12px;
      color: var(--muted);
      background: #f5eeeb;
      border-radius: 20px;
      padding: 5px 10px;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── LAYOUT ───────────────────────────── */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 16px 80px;
    }

    /* ─── SEARCH ───────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    #searchInput {
      padding-left: 40px;
      background: #fff;
      border-radius: 14px;
      border: 1.5px solid var(--line);
      box-shadow: var(--shadow);
      font-size: 13px;
    }

    .global-status {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 10px;
    }

    /* ─── DASHBOARD ────────────────────────── */
    .dashboard-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }


    .panel {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: 0 2px 10px rgba(140,90,80,0.06);
      overflow: hidden;
    }

    .panel-head { display: none; }

    /* Stats */
    .stats-body { padding: 0 10px 8px; }

    .stat-kpi-row {
      display: flex;
      gap: 0;
      padding: 14px 12px 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 8px;
    }

    .stat-kpi {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-kpi + .stat-kpi {
      border-left: 1px solid var(--line);
      padding-left: 16px;
    }

    .stat-kpi-label {
      font-size: 11px;
      color: var(--muted);
    }

    .stat-kpi-num {
      font-size: 15px;
      font-weight: 800;
      color: var(--accent-deep);
      line-height: 1;
    }

    .stat-types { display: flex; flex-direction: column; gap: 3px; }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: .15s;
    }

    .stat-row:hover { background: var(--accent-light); }

    .stat-row-name {
      font-size: 10px;
      color: var(--muted);
    }

    .stat-row-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }

    /* Calendar */
    .cal-body { padding: 6px 6px 6px; }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .cal-nav-btn {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: #f5eeeb;
      border: none;
      cursor: pointer;
      color: var(--accent-deep);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-weight: 700;
    }

    .cal-nav-btn:hover { background: var(--accent-light); }

    .cal-month-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-deep);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-wd {
      text-align: center;
      font-size: 9px;
      color: var(--muted);
      padding: 1px 0 3px;
    }

    .cal-day {
      aspect-ratio: 1/1;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #7a6060;
      cursor: pointer;
      position: relative;
      transition: .15s;
    }

    .cal-day:hover { background: #f5eeeb; }
    .cal-day.empty { cursor: default; }
    .cal-day.empty:hover { background: transparent; }

    .cal-day.has-rec {
      background: #fff0ef;
      color: var(--accent-deep);
      font-weight: 700;
    }

    .cal-day.selected {
      background: var(--accent);
      color: #fff;
    }

    .cal-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 1px;
    }

    .cal-day.selected .cal-dot { background: rgba(255,255,255,0.7); }

    .cal-hint { display: none; }

    /* ─── LIST VIEW ──────────────────────────── */
    .record-list { padding: 0; }

    .record-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-bottom: 1px solid #f5eeeb;
      transition: background .15s;
    }
    .record-row:last-child { border-bottom: none; }
    .record-row:hover { background: #fdf8f7; }

    .record-row-main { flex: 1; min-width: 0; }

    .record-row-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--accent-deep);
      margin-bottom: 2px;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 4px;
    }

    .record-row-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .meta-tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      background: #f5eeeb;
      color: #b89890;
    }

    .meta-rating {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
    }

    .record-wordcount {
      font-size: 11px;
      color: #b8a0a0;
      margin-bottom: 3px;
    }

    .record-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
    }

    .record-row-line2 {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      margin: 4px 0 3px;
    }

    .record-row-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .record-row-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 3px;
      gap: 8px;
    }

    .record-row-actions {
      display: flex;
      flex-direction: row;
      gap: 5px;
      flex-shrink: 0;
      align-items: center;
    }

    /* ─── RECORD LIST ──────────────────────── */
    .list-panel {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .list-head {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      background: linear-gradient(135deg, #fdf0ec, #f8e8e4);
      border-bottom: 1px solid var(--line);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .list-head #filterIndicator {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .list-head-title {
      font-size: 16px;
      font-weight: 400;
      color: var(--accent-deep);
      letter-spacing: 1px;
    }

    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(201,132,122,0.15);
      color: var(--accent-deep);
      padding: 3px 7px;
      border-radius: 20px;
      font-size: 10px;
    }

    .filter-pill-x {
      cursor: pointer;
      opacity: 0.6;
      font-size: 14px;
      line-height: 1;
    }
    .filter-pill-x:hover { opacity: 1; }

    .records-grid {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .book-card {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }

    .book-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(140,80,70,0.15);
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: linear-gradient(160deg, #fde8e0, #f5d5cc);
    }

    .book-cover-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: linear-gradient(160deg, #fde8e0, #f0d0c8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
    }

    .book-cover-placeholder .book-type-icon {
      font-size: 22px;
    }

    .book-cover-placeholder .book-name-short {
      font-size: 11px;
      color: var(--accent-deep);
      text-align: center;
      font-weight: 600;
      word-break: break-all;
      line-height: 1.3;
      max-height: 3.9em;
      overflow: hidden;
    }

    .book-info {
      padding: 7px 8px;
      background: #fff;
      border-top: 1px solid var(--line);
    }

    .book-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .book-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .book-rating {
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
    }

    .book-type-badge {
      font-size: 10px;
      color: var(--muted);
    }

    /* Detail overlay */
    .book-overlay {
      position: absolute;
      inset: 0;
      background: rgba(60,30,25,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      opacity: 0;
      transition: opacity .2s;
      border-radius: 12px;
    }

    .book-card:hover .book-overlay { opacity: 1; }

    .overlay-btn {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 80%;
      text-align: center;
      transition: background .15s;
    }

    .overlay-btn:hover { background: rgba(255,255,255,0.3); }
    .overlay-btn.danger { border-color: rgba(255,120,100,0.5); color: #ffb5a5; }

    /* Action sheet for mobile */
    .action-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(50,30,25,0.4);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    .action-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 16px 16px 36px;
      z-index: 201;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    }
    .action-sheet-title {
      font-size: 15px; font-weight: 700;
      color: var(--accent-deep);
      text-align: center; margin-bottom: 3px;
    }
    .action-sheet-sub {
      font-size: 12px; color: var(--muted);
      text-align: center; margin-bottom: 14px;
    }
    .action-sheet-btn {
      display: block; width: 100%;
      padding: 14px; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      border: none; cursor: pointer;
      margin-bottom: 8px; text-align: center; font-family: inherit;
    }
    .action-sheet-btn.primary { background: var(--accent); color: #fff; }
    .action-sheet-btn.secondary { background: #f2e8e5; color: var(--accent-deep); }
    .action-sheet-btn.danger { background: #fce8e8; color: var(--danger); }
    .action-sheet-btn.cancel { background: #f5f0ee; color: var(--muted); margin-bottom: 0; }

    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
    .empty-state-text { font-size: 14px; }

    /* ─── FAB ──────────────────────────────── */
    .fab {
      position: fixed;
      right: 20px;
      bottom: 24px;
      z-index: 50;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 26px;
      line-height: 1;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(201,132,122,0.4);
      transition: .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fab:hover { background: var(--accent-deep); transform: scale(1.08); }

    /* ─── DIALOG ───────────────────────────── */
    dialog {
      width: min(720px, calc(100vw - 16px));
      border: none;
      border-radius: 22px;
      padding: 0;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      max-height: 92vh;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }

    dialog::backdrop {
      background: rgba(50,30,25,0.4);
      backdrop-filter: blur(3px);
    }

    .modal-wrap {
      background: #fff;
      max-height: 88vh;
      overflow-y: auto;
      border-radius: 22px;
    }

    .modal-head {
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f5eeeb;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-deep);
    }

    .modal-body { padding: 18px 20px; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      cursor: pointer;
    }

    .rating-badge {
      min-width: 110px;
      text-align: center;
      padding: 7px 12px;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent-deep);
      font-size: 13px;
      font-weight: 700;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #f5eeeb;
    }
    .page-btn {
      min-width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
    }
    .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    /* ─── PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #f5eeeb;
    }
    .page-btn {
      padding: 5px 12px;
      border-radius: 8px;
      background: #f5eeeb;
      color: var(--accent-deep);
      font-size: 12px;
      border: none;
      cursor: pointer;
    }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-info { font-size: 11px; color: var(--muted); }

    /* ─── STAR RATING ──────────────────────── */
    .star-rating-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: #fdf8f7;
      border: 1.5px solid var(--line);
      border-radius: 12px;
    }

    .star-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .star-row-label {
      font-size: 12px;
      color: var(--muted);
      width: 32px;
      flex-shrink: 0;
    }

    .stars {
      display: flex;
      gap: 3px;
      flex: 1;
    }

    .star-unit {
      position: relative;
      width: 28px;
      height: 28px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .star-unit svg {
      width: 28px;
      height: 28px;
      pointer-events: none;
    }

    .star-half-left, .star-half-right {
      position: absolute;
      top: 0;
      height: 100%;
      width: 50%;
    }

    .star-half-left { left: 0; }
    .star-half-right { right: 0; }

    .star-total-preview {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid var(--line);
    }

    .star-total-preview strong {
      color: var(--accent-deep);
      font-size: 13px;
    }

    .tag-area {
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fdf8f7;
    }

    .tag-chip {
      display: inline-block;
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
      border: 1.5px solid var(--line);
      background: #fff;
      color: #9d7671;
      cursor: pointer;
      user-select: none;
      transition: .15s;
    }

    .tag-chip:hover { border-color: var(--accent); color: var(--accent-deep); }
    .tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .save-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .draft-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ─── RESPONSIVE ───────────────────────── */
    /* Safe area for notch phones */
    .app-header {
      padding-top: env(safe-area-inset-top);
    }
    .fab {
      bottom: calc(24px + env(safe-area-inset-bottom));
      right: calc(20px + env(safe-area-inset-right));
    }

    /* Minimum touch target size */
    .btn-sm { min-height: 32px; }
    button { min-height: 36px; }

    @media (max-width: 560px) {
      .dashboard-row { grid-template-columns: 1fr 1fr; gap: 8px; }
      .records-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .grid-2 { grid-template-columns: 1fr; }
      .modal-body { padding: 14px; }
      .modal-head { padding: 14px; }
      .book-overlay { display: none; }
    }

    @media (max-width: 380px) {
      .records-grid { grid-template-columns: repeat(2, 1fr); }
    }
  }
    @media (hover: none) {
      .stat-row:hover { background: initial; }
      .record-row:hover { background: initial; }
      .cal-day:hover { background: initial; }
    }
  </style>
</head>
<body>

<!-- ─── AUTH ─────────────────────────── -->
<section id="authScreen" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">📚</span>
      <h1>五谷丰登</h1>
      <p>私人阅读记录 · 云端同步</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn">登录</button>
      <button class="auth-tab" id="tabSignUp">注册</button>
    </div>
    <div class="field">
      <label for="email">邮箱</label>
      <input id="email" type="email" placeholder="请输入邮箱" autocomplete="username" />
    </div>
    <div class="field" id="nicknameField" style="display:none;">
      <label for="nickname">昵称</label>
      <input id="nickname" type="text" placeholder="给自己起个名字" />
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="btnAuthMain" style="width:100%; margin-top:4px;">登录</button>
    <div class="status" id="authStatus"></div>
  </div>
</section>

<!-- ─── APP ──────────────────────────── -->
<section id="appScreen" class="hidden">
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">📚</span>
        <span class="brand-name">五谷丰登</span>
      </div>
      <div class="header-right">
        <span class="user-badge" id="userEmail">-</span>
        <a href="public.html" style="text-decoration:none;"><button class="btn-ghost btn-sm">公共书架</button></a>
        <button class="btn-ghost btn-sm" id="btnSignOut">退出</button>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="搜索书名、标签、笔记、作者…" />
    </div>
    <div class="global-status" id="globalStatus"></div>

    <!-- Dashboard -->
    <div class="dashboard-row">
      <!-- Stats -->
      <div class="panel">

        <div class="stats-body" id="statsOverview">
          <div style="color:var(--muted); font-size:13px; padding:12px 0;">加载中…</div>
        </div>
      </div>

      <!-- Calendar -->
      <div class="panel">

        <div class="cal-body">
          <div class="cal-nav">
            <button class="cal-nav-btn" id="calPrev">‹</button>
            <span class="cal-month-label" id="calMonthLabel"></span>
            <button class="cal-nav-btn" id="calNext">›</button>
          </div>
          <div id="calendarWrap"></div>
          <div class="cal-hint" id="calHint">有记录的日期高亮显示</div>
        </div>
      </div>
    </div>

    <!-- Records -->
    <div class="list-panel">
      <div class="list-head">
        <span class="list-head-title">书架</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <div id="filterIndicator"></div>

        </div>
      </div>
      <div id="recordsList"></div>
    </div>
  </div>

  <button class="fab" id="btnOpenAdd">+</button>

  <!-- View Dialog -->
  <dialog id="viewDialog">
    <div class="modal-wrap">
      <div class="modal-head">
        <span class="modal-title" id="viewTitle">详情</span>
        <button class="btn-ghost" id="btnCloseView">关闭</button>
      </div>
      <div class="modal-body" id="viewBody"></div>
    </div>
  </dialog>
</section>

<!-- Action Sheet -->
<div id="actionSheetBackdrop" class="action-sheet-backdrop hidden"></div>
<div id="actionSheet" class="action-sheet hidden">
  <div class="action-sheet-title" id="actionSheetTitle"></div>
  <div class="action-sheet-sub" id="actionSheetSub"></div>
  <button class="action-sheet-btn primary" id="actionEdit">✏️ 编辑</button>
  <button class="action-sheet-btn secondary" id="actionCopy">📋 复制分享</button>
  <button class="action-sheet-btn danger" id="actionDelete">🗑️ 删除</button>
  <button class="action-sheet-btn cancel" id="actionCancel">取消</button>
</div>

<!-- ─── DIALOG ────────────────────────── -->
<dialog id="recordDialog">
  <div class="modal-wrap">
    <div class="modal-head">
      <span class="modal-title" id="dialogTitle">新增记录</span>
      <button class="btn-ghost" id="btnCloseDialog">关闭</button>
    </div>
    <div class="modal-body">
      <div class="grid-2">
        <div class="field">
          <label for="name">名称</label>
          <input id="name" type="text" placeholder="作品名称" />
        </div>
        <div class="field">
          <label for="type">类型</label>
          <select id="type"></select>
        </div>
      </div>

      <div class="field">
        <label>评分</label>
        <div class="star-rating-wrap">
          <div class="star-row">
            <span class="star-row-label">文笔</span>
            <div class="stars" id="starsWriting" data-dim="writing"></div>
          </div>
          <div class="star-row">
            <span class="star-row-label">情节</span>
            <div class="stars" id="starsPlot" data-dim="plot"></div>
          </div>
          <div class="star-row">
            <span class="star-row-label">人设</span>
            <div class="stars" id="starsCharacter" data-dim="character"></div>
          </div>
          <div class="star-total-preview" id="starTotalPreview">综合评分：—</div>
        </div>
        <input type="hidden" id="rating" value="0" />
      </div>

      <div class="field">
        <label>标签</label>
        <div class="tag-area">
          <div id="tagChips"></div>
          <div style="margin-top:8px;display:flex;gap:6px;align-items:center;">
            <input id="customTagInput" type="text" placeholder="输入自定义标签，回车添加" style="flex:2;" />
            <button class="btn-secondary btn-sm" id="btnAddCustomTag" style="flex:1;">添加</button>
            <button class="btn-danger btn-sm" id="btnClearTags" style="flex:1;">清空</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>可见范围</label>
        <div style="display:flex;gap:10px;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:300;">
            <input type="radio" name="visibility" id="visPrivate" value="private" checked /> 私密
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:300;">
            <input type="radio" name="visibility" id="visPublic" value="public" /> 公开
          </label>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label for="reviewDate">阅读日期</label>
          <input id="reviewDate" type="date" />
        </div>
      </div>

      <div class="grid-2 hidden" id="blExtraWrap">
        <div class="field">
          <label for="author">作者</label>
          <input id="author" type="text" placeholder="作者名" />
        </div>
        <div class="field">
          <label for="mainCharacters">主角</label>
          <input id="mainCharacters" type="text" placeholder="主角名，逗号分隔" />
        </div>
      </div>

      <div class="field hidden" id="originalIntroWrap">
        <label for="originalIntroFile">原文介绍截图</label>
        <input id="originalIntroFile" type="file" accept="image/*" />
        <div class="draft-note" id="uploadHint">支持 jpg/png/webp，自动压缩后上传</div>
        <div id="uploadPreview" style="margin-top:10px;"></div>
      </div>

      <div class="field">
        <label for="summary">故事梗概</label>
        <textarea id="summary" placeholder="主线、人物关系、看点…"></textarea>
      </div>

      <div class="field">
        <label for="notes">读后感</label>
        <textarea id="notes" placeholder="感想、摘抄、推荐理由…"></textarea>
      </div>

      <div class="field" style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <label style="margin:0;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="isPublic" style="width:auto;border:none;box-shadow:none;padding:0;" />
          公开到公共书架
        </label>
        <span style="font-size:11px;color:var(--muted);">（其他用户可见书名、作者、评分、标签）</span>
      </div>
      <div class="save-actions">
        <button class="btn-primary" id="btnSave">保存记录</button>
        <button class="btn-secondary" id="btnCancelSave">取消</button>
        <button class="btn-danger" id="btnDeleteFromEdit" style="margin-left:auto;">删除此记录</button>
      </div>
      <div class="status" id="saveState"></div>
      <div class="draft-note" id="draftState">草稿未保存</div>
    </div>
  </div>
</dialog>

<script src="config.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
  const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';

  const TYPE_OPTIONS = ['BL小说', '文学小说', '非虚构书籍', '广播剧'];
  const TYPE_ICONS = { 'BL小说': '🌙', '文学小说': '📖', '非虚构书籍': '📝', '广播剧': '🎧' };

  const TAG_LIBRARY = {
    'BL小说': ['修真','种田','无限流','校园','重生','穿书','快穿','星际','ABO','哨向','娱乐圈','破镜重圆','玄幻','灵异','年下','双强','年上','末世'],
    '文学小说': ['悬疑','推理','严肃文学','女性文学','成长','家庭','历史','社会派'],
    '非虚构书籍': ['投资','传记','历史','社会学','心理学','商业','纪实','访谈'],
    '广播剧': ['猫耳','漫播','现代','古风','校园','悬疑','刑侦','ABO']
  };

  const $ = id => document.getElementById(id);
  const els = {
    authScreen: $('authScreen'), appScreen: $('appScreen'),
    email: $('email'), password: $('password'),
    tabSignIn: $('tabSignIn'), tabSignUp: $('tabSignUp'),
    btnAuthMain: $('btnAuthMain'), authStatus: $('authStatus'),
    globalStatus: $('globalStatus'), userEmail: $('userEmail'),
    btnSignOut: $('btnSignOut'),
    statsOverview: $('statsOverview'),
    calendarWrap: $('calendarWrap'), calMonthLabel: $('calMonthLabel'),
    calPrev: $('calPrev'), calNext: $('calNext'), calHint: $('calHint'),
    searchInput: $('searchInput'), recordsList: $('recordsList'),
    filterIndicator: $('filterIndicator'),
    btnOpenAdd: $('btnOpenAdd'),
    viewDialog: $('viewDialog'), btnCloseView: $('btnCloseView'),
    recordDialog: $('recordDialog'), btnCloseDialog: $('btnCloseDialog'),
    btnCancelSave: $('btnCancelSave'), dialogTitle: $('dialogTitle'),
    name: $('name'), type: $('type'), rating: $('rating'),
    tagChips: $('tagChips'), customTagInput: $('customTagInput'), btnAddCustomTag: $('btnAddCustomTag'),
    notes: $('notes'), btnSave: $('btnSave'), saveState: $('saveState'),
    reviewDate: $('reviewDate'),
    blExtraWrap: $('blExtraWrap'), author: $('author'), mainCharacters: $('mainCharacters'),
    originalIntroWrap: $('originalIntroWrap'), originalIntroFile: $('originalIntroFile'),
    uploadHint: $('uploadHint'), uploadPreview: $('uploadPreview'),
    summary: $('summary'), draftState: $('draftState')
  };

  let supabase = null, currentUser = null, allRecords = [];
  let selectedTags = new Set(), customTagsByType = {};
  let authMode = 'signin', editingRecordId = null;
  let uploadedOriginalIntroUrl = '', selectedDateFilter = '', selectedMonthFilter = '';
  let currentPage = 1;
  const PAGE_SIZE = 20;
  let calYear, calMonth;

  function initCalMonth() {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth() + 1;
  }

  function esc(v) {
    return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getRatingLabel(r) {
    const v = Number(r);
    if (v === 10) return '神作';
    if (v >= 7.5) return '推荐';
    if (v >= 5.5) return '普通';
    if (v >= 2.5) return '能看';
    return '难看';
  }

  // ── Star Rating ──
  const starDims = { writing: 0, plot: 0, character: 0 };

  function renderStars(dimId, value) {
    const container = document.getElementById('stars' + dimId.charAt(0).toUpperCase() + dimId.slice(1));
    if (!container) return;
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const unit = document.createElement('div');
      unit.className = 'star-unit';
      unit.dataset.dim = dimId;
      unit.dataset.val = i;
      const fill = value >= i ? 1 : value >= i - 0.5 ? 0.5 : 0;
      const leftColor = fill >= 0.5 ? '#c9847a' : '#e8d5d0';
      const rightColor = fill >= 1 ? '#c9847a' : '#e8d5d0';
      unit.innerHTML = `
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sg_${dimId}_${i}" x1="0" x2="1" y1="0" y2="0">
              <stop offset="50%" stop-color="${leftColor}"/>
              <stop offset="50%" stop-color="${rightColor}"/>
            </linearGradient>
          </defs>
          <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
            fill="url(#sg_${dimId}_${i})" stroke="#c9847a" stroke-width="1.2"/>
        </svg>`;
      container.appendChild(unit);
    }
  }

  function initAllStars() {
    ['writing', 'plot', 'character'].forEach(d => renderStars(d, starDims[d]));
    updateStarTotal();
  }

  function updateStarTotal() {
    const vals = Object.values(starDims).filter(v => v > 0);
    if (!vals.length) {
      document.getElementById('starTotalPreview').innerHTML = '综合评分：—';
      // keep existing rating value if no stars set
      return;
    }
    const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
    const total = Math.round(avg * 2 * 10) / 10; // scale to 0-10
    els.rating.value = total;
    document.getElementById('starTotalPreview').innerHTML = `综合评分：<strong>★ ${total} · ${getRatingLabel(total)}</strong>`;
  }

  function getCustomTagKey() { return currentUser ? `spirit_custom_tags_${currentUser.id}` : 'spirit_custom_tags_guest'; }
  function getDraftKey() { return currentUser ? `spirit_form_draft_${currentUser.id}` : 'spirit_form_draft_guest'; }

  function loadCustomTags() {
    try { customTagsByType = JSON.parse(localStorage.getItem(getCustomTagKey()) || '{}'); }
    catch { customTagsByType = {}; }
  }

  function saveCustomTags() { localStorage.setItem(getCustomTagKey(), JSON.stringify(customTagsByType)); }

  function getMergedTags(type) {
    return [...new Set([...(TAG_LIBRARY[type] || []), ...(customTagsByType[type] || [])])];
  }

  function showScreen(s) {
    els.authScreen.classList.toggle('hidden', s !== 'auth');
    els.appScreen.classList.toggle('hidden', s !== 'app');
  }

  function setGlobal(t) { els.globalStatus.textContent = t; }
  function setAuthStatus(t) { els.authStatus.textContent = t; }
  function setSaveState(t) { els.saveState.textContent = t; }
  function setDraftState(t) { els.draftState.textContent = t; }

  function updateAuthUI() {
    const isIn = authMode === 'signin';
    els.tabSignIn.className = 'auth-tab' + (isIn ? ' active' : '');
    els.tabSignUp.className = 'auth-tab' + (!isIn ? ' active' : '');
    els.btnAuthMain.textContent = isIn ? '登录' : '注册';
    document.getElementById('nicknameField').style.display = isIn ? 'none' : 'block';
    setAuthStatus('');
  }

  function updateRatingUI() { /* slider removed, no-op */ }

  function updateTypeFields() {
    const isBL = els.type.value === 'BL小说';
    els.blExtraWrap.classList.toggle('hidden', !isBL);
    els.originalIntroWrap.classList.toggle('hidden', !isBL);
  }

  function renderTagChips() {
    const type = els.type.value;
    const tags = getMergedTags(type);
    els.tagChips.innerHTML = tags.map(t =>
      `<span class="tag-chip ${selectedTags.has(t) ? 'active' : ''}" data-tag="${esc(t)}">${esc(t)}</span>`
    ).join('') || '<div style="font-size:13px;color:var(--muted);">先添加自定义标签吧</div>';
  }

  // ── Stats ──
  function renderStats() {
    const counter = {};
    allRecords.forEach(r => { counter[r.type || '未分类'] = (counter[r.type || '未分类'] || 0) + 1; });
    const entries = Object.entries(counter).sort((a, b) => b[1] - a[1]);

    if (!allRecords.length) {
      els.statsOverview.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:12px 0;">还没有记录</div>`;
      return;
    }

    const totalWords = allRecords.reduce((sum, r) => sum + (r.story_summary||'').length + (r.notes||'').length, 0);
    const wordNum = totalWords >= 10000 ? (totalWords/10000).toFixed(1)+'万' : String(totalWords);
    const wordLabel = wordNum + ' 字';

    const now = new Date();
    const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const monthCount = allRecords.filter(r => {
      const k = getDateKey(r);
      return k && k.startsWith(thisMonth);
    }).length;

    els.statsOverview.innerHTML = `
      <div class="stat-kpi-row">
        <div class="stat-kpi" data-monthfilter="${thisMonth}" style="cursor:pointer;">
          <span class="stat-kpi-label" style="pointer-events:none;">本月记录</span>
          <span class="stat-kpi-num" style="pointer-events:none;">${monthCount}</span>
        </div>
        <div class="stat-kpi">
          <span class="stat-kpi-label">累计书写</span>
          <span class="stat-kpi-num">${wordLabel}</span>
        </div>
      </div>
      <div class="stat-types">
        ${entries.map(([type, count]) => `
          <div class="stat-row" data-typefilter="${esc(type)}">
            <span class="stat-row-name">${TYPE_ICONS[type] || '📌'} ${esc(type)}</span>
            <span class="stat-row-count">${count}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  // ── Calendar ──
  function getDateKey(r) {
    const raw = r.review_date || r.created_at;
    if (!raw) return '';
    const d = new Date(raw);
    if (isNaN(d)) return '';
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function renderCalendar() {
    const monthKey = `${calYear}-${String(calMonth).padStart(2,'0')}`;
    const monthKey2 = `${calYear}-${String(calMonth).padStart(2,'0')}`;
    els.calMonthLabel.innerHTML = `<span style="cursor:pointer;text-decoration:${selectedMonthFilter===monthKey2?'underline':'none'};opacity:${selectedMonthFilter===monthKey2?'1':'0.85'};" data-monthfilter="${monthKey2}">${calYear}年${calMonth}月</span>`;

    const firstDay = new Date(calYear, calMonth - 1, 1);
    const lastDate = new Date(calYear, calMonth, 0).getDate();
    const startWd = (firstDay.getDay() + 6) % 7;

    const counter = {};
    allRecords.forEach(r => {
      const k = getDateKey(r);
      if (k.startsWith(monthKey)) counter[k] = (counter[k] || 0) + 1;
    });

    const wds = ['一','二','三','四','五','六','日'];
    let html = `<div class="cal-grid">`;
    html += wds.map(w => `<div class="cal-wd">${w}</div>`).join('');
    for (let i = 0; i < startWd; i++) html += `<div class="cal-day empty"></div>`;
    for (let day = 1; day <= lastDate; day++) {
      const k = `${monthKey}-${String(day).padStart(2,'0')}`;
      const has = !!counter[k];
      const sel = selectedDateFilter === k;
      html += `<div class="cal-day ${has ? 'has-rec' : ''} ${sel ? 'selected' : ''}" data-datefilter="${k}">
        ${day}${has ? `<span class="cal-dot"></span>` : ''}
      </div>`;
    }
    html += `</div>`;
    els.calendarWrap.innerHTML = html;
    els.calHint.textContent = selectedDateFilter ? `📅 ${selectedDateFilter}` : '有记录的日期高亮显示';
  }

  // ── Records ──
  function renderRecords() {
    const keyword = els.searchInput.value.trim().toLowerCase();
    const typeFilter = els.searchInput.dataset.typefilter || '';
    const monthFilter = selectedMonthFilter;

    const filtered = allRecords.filter(r => {
      if (selectedDateFilter && getDateKey(r) !== selectedDateFilter) return false;
      if (monthFilter && !getDateKey(r).startsWith(monthFilter)) return false;
      if (typeFilter && r.type !== typeFilter) return false;
      if (!keyword) return true;
      return [r.name, r.type, ...(r.tags||[]), r.notes||'', r.author||'', r.main_characters||''].join(' ').toLowerCase().includes(keyword);
    });

    // Filter indicator
    const pills = [];
    if (typeFilter) pills.push(`<span class="filter-pill">${TYPE_ICONS[typeFilter]||''} ${esc(typeFilter)} <span class="filter-pill-x" data-cleartype="1">×</span></span>`);
    if (selectedMonthFilter) pills.push(`<span class="filter-pill">📅 ${selectedMonthFilter} <span class="filter-pill-x" data-clearmonth="1">×</span></span>`);
    if (selectedDateFilter) pills.push(`<span class="filter-pill">📅 ${selectedDateFilter} <span class="filter-pill-x" data-cleardate="1">×</span></span>`);
    els.filterIndicator.innerHTML = pills.join('');

    currentPage = Math.min(currentPage, Math.ceil(filtered.length / PAGE_SIZE) || 1);
    const pageStart = (currentPage - 1) * PAGE_SIZE;
    const paged = filtered.slice(pageStart, pageStart + PAGE_SIZE);
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);

    if (!filtered.length) {
      els.recordsList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">${allRecords.length ? '🔍' : '📚'}</div>
          <div class="empty-state-text">${allRecords.length ? '没有匹配的记录' : '还没有记录，点右下角 + 开始添加'}</div>
        </div>`;
      return;
    }

    els.recordsList.innerHTML = `<div class="record-list">${paged.map(r => {
      const icon = TYPE_ICONS[r.type] || '📌';
      const tagsHtml = (r.tags||[]).map(t => `<span class="meta-tag">${esc(t)}</span>`).join('');
      const authorChars = [r.author, r.main_characters].filter(Boolean).map(s => esc(s)).join(' · ');
      const date = r.review_date || '';
      const words = (r.story_summary||'').length + (r.notes||'').length;
      const wordStr = words > 0 ? (words >= 10000 ? (words/10000).toFixed(1)+'万字' : words+'字') : '';
      return `
        <div class="record-row">
          <div class="record-row-main">
            <div class="record-row-title">
              ${icon} ${esc(r.name)}
              ${authorChars ? `<span class="record-sub">${authorChars}</span>` : ''}
            </div>
            <div class="record-row-line2">
              <span class="meta-rating">★ ${r.rating} · ${getRatingLabel(r.rating)}</span>
              ${date ? `<span class="meta-tag">📅 ${date}</span>` : ''}
              ${wordStr ? `<span class="meta-tag">✍️ ${wordStr}</span>` : ''}
            </div>
            ${tagsHtml ? `<div class="record-row-bottom"><div class="record-row-tags">${tagsHtml}</div><div class="record-row-actions"><button class="btn-ghost btn-sm" data-view="${r.id}">查看</button><button class="btn-secondary btn-sm" data-edit="${r.id}">编辑</button></div></div>` : `<div class="record-row-bottom"><div></div><div class="record-row-actions"><button class="btn-ghost btn-sm" data-view="${r.id}">查看</button><button class="btn-secondary btn-sm" data-edit="${r.id}">编辑</button></div></div>`}
          </div>
        </div>`;
    }).join('')}</div>${totalPages > 1 ? `
    <div class="pagination">
      <button class="page-btn" ${currentPage===1?'disabled':''} data-page="${currentPage-1}">‹</button>
      ${Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i+1===currentPage?'active':''}" data-page="${i+1}">${i+1}</button>`).join('')}
      <button class="page-btn" ${currentPage===totalPages?'disabled':''} data-page="${currentPage+1}">›</button>
    </div>` : ''}`;
  }

  async function saveRecord() {
    if (!currentUser) return;
    els.btnSave.disabled = true;
    setSaveState('保存中…');
    try {
      const payload = {
        name: els.name.value.trim(),
        type: els.type.value,
        rating: Number(els.rating.value),
        tags: [...selectedTags],
        notes: els.notes.value.trim(),
        review_date: els.reviewDate.value || null,
        author: els.author.value.trim(),
        main_characters: els.mainCharacters.value.trim(),
        story_summary: els.summary.value.trim(),
        cover_url: uploadedOriginalIntroUrl || allRecords.find(r => String(r.id) === String(editingRecordId))?.cover_url || '',
        intro: '',
        rating_writing: starDims.writing || null,
        rating_plot: starDims.plot || null,
        rating_character: starDims.character || null,
        is_public: document.getElementById('visPublic').checked,
        is_public: document.getElementById('isPublic').checked
      };
      if (!payload.name) { alert('请填写名称'); return; }
      let error;
      if (editingRecordId) {
        ({ error } = await supabase.from('spirit_records')
          .update(payload)
          .eq('id', editingRecordId)
          .eq('user_id', currentUser.id));
      } else {
        ({ error } = await supabase.from('spirit_records')
          .insert({ ...payload, user_id: currentUser.id }));
      }
      if (error) { setSaveState('失败：' + error.message); alert(error.message); return; }
      setSaveState('✓ 保存成功');
      els.recordDialog.close();
      resetForm();
      localStorage.removeItem(getDraftKey());
      await fetchRecords();
    } catch(e) {
      setSaveState('保存异常');
      alert(e.message || '未知错误');
    } finally {
      els.btnSave.disabled = false;
    }
  }

  // ── Image upload ──
  async function compressImage(file, maxW = 1600, quality = 0.82) {
    return new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          let { width: w, height: h } = img;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => {
            if (!blob) return rej(new Error('压缩失败'));
            res(new File([blob], file.name.replace(/\.[^.]+$/, '') + '.jpg', { type: 'image/jpeg' }));
          }, 'image/jpeg', quality);
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function uploadImage(file) {
    if (!currentUser || !file) return;
    els.originalIntroFile.disabled = true;
    els.uploadHint.textContent = file.size > 500*1024 ? '压缩中…' : '上传中…';
    try {
      const uploadFile = file.size > 500*1024 ? await compressImage(file) : file;
      els.uploadHint.textContent = '上传中…';
      const path = `${currentUser.id}/${Date.now()}.jpg`;
      const { error } = await supabase.storage.from('covers').upload(path, uploadFile, { contentType: 'image/jpeg', upsert: false });
      if (error) { els.uploadHint.textContent = '上传失败'; alert(error.message); return; }
      const { data } = supabase.storage.from('covers').getPublicUrl(path);
      uploadedOriginalIntroUrl = data.publicUrl;
      els.uploadHint.textContent = '上传成功';
      els.uploadPreview.innerHTML = `<img src="${esc(uploadedOriginalIntroUrl)}" style="max-width:100%;border-radius:12px;" />`;
      saveDraft();
    } catch(err) {
      els.uploadHint.textContent = '处理失败';
      alert(err.message);
    } finally {
      els.originalIntroFile.disabled = false;
    }
  }

      setAuthStatus('未找到 Supabase 配置'); return;
    }
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data: { session } } = await supabase.auth.getSession();
    currentUser = session?.user ?? null;

    supabase.auth.onAuthStateChange(async (_event, session) => {
      currentUser = session?.user ?? null;
      if (currentUser) onLogin(); else showScreen('auth');
    });

    if (currentUser) { onLogin(); }
    else {
      showScreen('auth');
      const rem = localStorage.getItem('remembered_login_email');
      if (rem) els.email.value = rem;
    }
  }

      const val = parseFloat(t.dataset.val);
      const cur = starDims[dim];
      // cycle: 0→full→half→0, or if clicking different star: set full
      if (cur === val) starDims[dim] = val - 0.5;
      else if (cur === val - 0.5) starDims[dim] = 0;
      else starDims[dim] = val;
      renderStars(dim, starDims[dim]);

    }
    if (t.dataset.datefilter) {
      selectedDateFilter = selectedDateFilter === t.dataset.datefilter ? '' : t.dataset.datefilter;
      currentPage = 1; renderCalendar(); renderRecords();
    }
    if (t.dataset.cleartype) {
      els.searchInput.dataset.typefilter = ''; renderRecords();
    }
    if (t.dataset.cleardate) {
      selectedDateFilter = ''; renderCalendar(); renderRecords();
    }
    if (t.dataset.monthfilter) {
      selectedMonthFilter = selectedMonthFilter === t.dataset.monthfilter ? '' : t.dataset.monthfilter;
      selectedDateFilter = '';
      renderCalendar(); renderRecords();
    }
    if (t.dataset.clearmonth) {
      selectedMonthFilter = ''; renderCalendar(); renderRecords();
    }
    if (t.dataset.page) {
      currentPage = parseInt(t.dataset.page);
      renderRecords();
      document.querySelector('.list-panel').scrollIntoView({behavior:'smooth'});
    }
    if (t.dataset.view) openView(t.dataset.view);
    if (t.dataset.edit) openEdit(t.dataset.edit);
    if (t.dataset.delete) await deleteRecord(t.dataset.delete);
    if (t.dataset.copy) await copyRecord(t.dataset.copy);

    // Book card tap → action sheet
    const card = t.closest('.book-card');
    if (card && !t.dataset.edit && !t.dataset.delete && !t.dataset.copy) {
      showActionSheet(card.dataset.id);
    }
  });

  bootstrap();
</script>
</body>
</html>
